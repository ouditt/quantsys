<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>QTSYS Terminal</title>
<style>
:root{
  --bg0:#07090d; --bg1:#0b0f15; --panel:#10151d; --panel2:#141b25;
  --line:#1c2531; --line2:#26313f;
  --amber:#ffb200; --amber-dim:#8a6a1f; --amber-glow:rgba(255,178,0,.14);
  --up:#27d17f; --dn:#ff5063; --info:#58a6ff; --warn:#ffc24d;
  --txt:#d7dee9; --mut:#77839a; --mut2:#4d586c;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --r:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg0);color:var(--txt);font:13px/1.45 var(--mono);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
::selection{background:var(--amber);color:#000}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:var(--txt);background:var(--bg1);
  border:1px solid var(--line2);border-radius:4px;padding:7px 9px;outline:none}
input:focus,select:focus,button:focus-visible{border-color:var(--amber);
  box-shadow:0 0 0 2px var(--amber-glow)}
a{color:var(--amber);text-decoration:none}
.num{font-variant-numeric:tabular-nums}
.up{color:var(--up)} .dn{color:var(--dn)} .mut{color:var(--mut)}

/* ------------------------------------------- posture themes */
body[data-posture="SURVIVAL"]{
  --bg0:#04100a; --bg1:#071810; --panel:#0a2015; --panel2:#0d2a1c;
  --line:#153422; --line2:#1e462e; --amber-glow:rgba(39,209,127,.14);}
body[data-posture="AGGRESSIVE"]{
  --bg0:#050a16; --bg1:#091223; --panel:#0d1a30; --panel2:#11223f;
  --line:#1a2c4d; --line2:#254066; --amber-glow:rgba(88,166,255,.14);}
#pbar{display:flex;align-items:center;gap:8px;padding:5px 12px;flex-wrap:wrap;
  background:var(--bg1);border-bottom:1px solid var(--line);font-size:11px}
#pbar .lbl{color:var(--mut2);letter-spacing:.1em;font-size:10px}
#pbar .pdiv{color:var(--line2);margin:0 2px}
#pbar .v.pos{color:#27d17f}
#pbar .v.neg{color:#ff6b6b}
#pbar .v.tk-ok{color:#27d17f}
#pbar .v.tk-bad{color:#ff6b6b}
#pbar .v.tk-wait{color:var(--mut2)}
.pseg{display:flex;border:1px solid var(--line2);border-radius:4px;overflow:hidden}
.pseg button{padding:3px 9px;font-size:10px;letter-spacing:.06em;color:var(--mut)}
.pseg button+button{border-left:1px solid var(--line2)}
.pseg button.on[data-p="SURVIVAL"]{background:rgba(39,209,127,.15);color:var(--up)}
.pseg button.on[data-p="BALANCED"]{background:rgba(255,178,0,.15);color:var(--amber)}
.pseg button.on[data-p="AGGRESSIVE"]{background:rgba(88,166,255,.15);color:var(--info)}
.pstat{display:flex;align-items:baseline;gap:4px;white-space:nowrap}
.pstat .k{color:var(--mut2);font-size:10px}
.pstat .v{font-weight:600}
.help{display:inline-block;width:12px;height:12px;line-height:12px;text-align:center;
  border:1px solid var(--line2);border-radius:50%;color:var(--mut2);font-size:9px;
  cursor:help;position:relative;user-select:none}
.help::after{content:attr(data-tip);position:absolute;left:50%;top:16px;
  transform:translateX(-50%);width:230px;background:var(--panel2);
  border:1px solid var(--line2);border-radius:4px;padding:7px 8px;color:var(--txt);
  font-size:10px;line-height:1.5;white-space:normal;z-index:60;display:none;
  box-shadow:0 6px 18px rgba(0,0,0,.5)}
.help:hover::after,.help:focus::after{display:block}
#pbar .help:nth-last-child(-n+2)::after{left:auto;right:0;transform:none}

/* ------------------------------------------------ header */
#top{display:flex;align-items:center;gap:12px;padding:8px 12px;
  background:var(--bg1);border-bottom:1px solid var(--line);flex-wrap:wrap}
#brand{font-weight:700;letter-spacing:.14em;color:var(--amber);font-size:14px}
#brand span{color:var(--mut);font-weight:400;letter-spacing:.04em}
.chip{font-size:10px;letter-spacing:.08em;padding:3px 8px;border-radius:3px;
  border:1px solid var(--line2);color:var(--mut);white-space:nowrap}
.chip.live{border-color:var(--up);color:var(--up)}
.chip.demo{border-color:var(--warn);color:var(--warn)}
.chip.open{color:var(--up);border-color:rgba(39,209,127,.4)}
.chip.closed{color:var(--mut)}
#equity{margin-left:auto;text-align:right;line-height:1.2}
#equity .v{font-size:15px;font-weight:600}
#equity .d{font-size:11px}
#agents-led{display:flex;align-items:center;gap:6px;font-size:10px;
  letter-spacing:.08em;color:var(--mut)}
.led{width:8px;height:8px;border-radius:50%;background:var(--mut2)}
.led.on{background:var(--up);animation:pulse 2.2s infinite}
.led.off{background:var(--dn)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(39,209,127,.5)}
  55%{box-shadow:0 0 0 6px rgba(39,209,127,0)}}
#killbtn{border:1px solid var(--dn);color:var(--dn);padding:6px 12px;
  border-radius:4px;font-weight:700;letter-spacing:.1em;font-size:11px}
#killbtn:hover{background:rgba(255,80,99,.12)}
#killbtn.halted{background:var(--dn);color:#000}

/* ------------------------------------------------ tape */
#tape{position:relative;overflow:hidden;background:var(--bg1);
  border-bottom:1px solid var(--line);height:30px;flex:none}
#tape-inner{position:absolute;white-space:nowrap;display:flex;gap:26px;
  align-items:center;height:100%;padding:0 12px;will-change:transform}
.tp{cursor:pointer;font-size:11px}
.tp b{color:var(--amber);font-weight:600;margin-right:6px}

/* ------------------------------------------------ shell */
#shell{flex:1;display:flex;min-height:0}
#rail{display:none}
#view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 12px 8px;scrollbar-width:thin;scrollbar-color:var(--line2) transparent}
#view::-webkit-scrollbar{width:8px}
#view::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}

/* ------------------------------------------------ command bar + tabs */
#cmdwrap{flex:none;background:var(--bg1);border-top:1px solid var(--line);
  padding:8px 12px 6px}
#cmdrow{display:flex;align-items:center;gap:8px;background:var(--bg0);
  border:1px solid var(--line2);border-radius:5px;padding:2px 10px}
#cmdrow:focus-within{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-glow)}
#cmdrow .p{color:var(--amber);font-weight:700}
#cmd{flex:1;background:none;border:none;box-shadow:none;padding:8px 0;
  text-transform:uppercase;letter-spacing:.05em}
#cmdhint{font-size:10px;color:var(--mut2);padding:5px 2px 0;letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#cmdhint b{color:var(--amber-dim)}
#tabs{flex:none;display:flex;background:var(--bg1);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
#tabs button{flex:1;padding:10px 2px 12px;font-size:10px;letter-spacing:.1em;
  color:var(--mut);border-top:2px solid transparent}
#tabs button.on{color:var(--amber);border-top-color:var(--amber)}

/* ------------------------------------------------ generic panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  margin-bottom:12px;overflow:hidden}
.ph{display:flex;align-items:center;gap:8px;padding:9px 12px;
  border-bottom:1px solid var(--line);font-size:10px;letter-spacing:.14em;
  color:var(--mut);text-transform:uppercase}
.ph .right{margin-left:auto;display:flex;gap:6px;align-items:center;text-transform:none;letter-spacing:0}
.pb{padding:10px 12px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;letter-spacing:.1em;color:var(--mut2);text-align:right;
  padding:7px 10px;border-bottom:1px solid var(--line);font-weight:500;
  text-transform:uppercase;white-space:nowrap}
th:first-child,td:first-child{text-align:left}
td{padding:8px 10px;border-bottom:1px solid rgba(28,37,49,.55);text-align:right;
  white-space:nowrap;font-size:12.5px}
tr:last-child td{border-bottom:none}
tr.rowlink{cursor:pointer}
tr.rowlink:hover{background:var(--panel2)}
.sym{color:var(--amber);font-weight:600;cursor:pointer;letter-spacing:.03em}
.sym:hover{text-decoration:underline}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;
  letter-spacing:.06em;border:1px solid var(--line2);color:var(--mut)}
.pill.up{color:var(--up);border-color:rgba(39,209,127,.35);background:rgba(39,209,127,.07)}
.pill.dn{color:var(--dn);border-color:rgba(255,80,99,.35);background:rgba(255,80,99,.07)}
.pill.working{color:var(--warn);border-color:rgba(255,194,77,.4);animation:blink 1.6s infinite}
.pill.filled{color:var(--up);border-color:rgba(39,209,127,.35)}
.pill.rejected,.pill.cancelled{color:var(--dn);border-color:rgba(255,80,99,.35)}
@keyframes blink{50%{opacity:.55}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:var(--bg1);border:1px solid var(--line);border-radius:5px;padding:9px 11px}
.stat .k{font-size:9.5px;letter-spacing:.12em;color:var(--mut2);text-transform:uppercase}
.stat .v{font-size:16px;font-weight:600;margin-top:3px}
.stat .s{font-size:10.5px;color:var(--mut);margin-top:2px}
.btn{border:1px solid var(--line2);border-radius:4px;padding:8px 14px;
  font-size:11px;letter-spacing:.08em;color:var(--txt)}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.primary{background:var(--amber);color:#000;font-weight:700;border-color:var(--amber)}
.btn.primary:hover{filter:brightness(1.1)}
.btn.danger{border-color:var(--dn);color:var(--dn)}
.btn.tiny{padding:4px 9px;font-size:10px}
.seg{display:flex;border:1px solid var(--line2);border-radius:4px;overflow:hidden}
.seg button{padding:6px 12px;font-size:11px;color:var(--mut)}
.seg button.on{background:var(--amber);color:#000;font-weight:700}
.note{font-size:11px;color:var(--mut);padding:8px 12px;border-top:1px dashed var(--line)}
.bar{height:7px;background:var(--bg0);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--amber)}
.bar i.hot{background:var(--dn)}

/* ------------------------------------------------ security page */
#sec-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px}
#sec-head h1{font-size:22px;letter-spacing:.04em;color:var(--amber)}
#sec-head .nm{color:var(--txt);font-size:13px}
#backbtn{color:var(--mut);font-size:11px;letter-spacing:.1em;padding:4px 8px 4px 0}
#backbtn:hover{color:var(--amber)}
.bigpx{font-size:26px;font-weight:700}
#chartwrap{position:relative}
#chart{width:100%;display:block;touch-action:none}
#xhair{position:absolute;top:8px;left:10px;font-size:10.5px;color:var(--mut);
  background:rgba(7,9,13,.85);padding:3px 7px;border-radius:3px;border:1px solid var(--line);
  pointer-events:none;display:none}
.tfrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ------------------------------------------------ agents */
.agent{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;
  border-bottom:1px solid var(--line)}
.agent:last-child{border-bottom:none}
.agent .dot{margin-top:4px;flex:none}
.agent h4{font-size:12.5px;letter-spacing:.05em}
.agent .role{font-size:10.5px;color:var(--mut)}
.agent .msg{font-size:11px;color:var(--mut);margin-top:4px;font-style:normal}
.agent .hb{font-size:10px;color:var(--mut2)}
.sw{position:relative;width:38px;height:20px;flex:none;border-radius:20px;
  background:var(--line2);transition:background .15s;border:none}
.sw i{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;
  background:var(--mut);transition:all .15s}
.sw.on{background:var(--up)}
.sw.on i{left:20px;background:#04140c}
.logline{padding:5px 12px;font-size:11px;border-bottom:1px solid rgba(28,37,49,.5);
  display:flex;gap:8px}
.logline .t{color:var(--mut2);flex:none}
.logline .a{color:var(--amber-dim);flex:none;width:110px;overflow:hidden;text-overflow:ellipsis}
.logline.error .m{color:var(--dn)}

/* ------------------------------------------------ toasts + modal */
#toasts{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;gap:8px;z-index:60;width:min(92vw,420px)}
.toast{background:var(--panel2);border:1px solid var(--line2);border-left:3px solid var(--amber);
  border-radius:5px;padding:10px 12px;font-size:12px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.err{border-left-color:var(--dn)}
.toast.ok{border-left-color:var(--up)}
#modal{position:fixed;inset:0;background:rgba(4,6,9,.72);display:none;
  align-items:center;justify-content:center;z-index:70;padding:20px}
#modal.show{display:flex}
#modal .box{background:var(--panel);border:1px solid var(--line2);border-radius:8px;
  padding:18px;width:min(92vw,380px)}
#modal h3{font-size:13px;letter-spacing:.08em;margin-bottom:8px;color:var(--dn)}
#modal p{font-size:12px;color:var(--mut);margin-bottom:14px}
#modal .row{display:flex;gap:8px;justify-content:flex-end}

@media(prefers-reduced-motion:reduce){
  .led.on,.pill.working{animation:none}
  #tape-inner{animation:none!important;transform:none!important}
}
/* ------------------------------------------------ desktop */
@media(min-width:1000px){
  #tabs{display:none}
  #rail{display:flex;flex-direction:column;gap:2px;padding:12px 8px;
    border-right:1px solid var(--line);background:var(--bg1);width:132px;flex:none}
  #rail button{text-align:left;padding:9px 12px;font-size:11px;letter-spacing:.1em;
    color:var(--mut);border-left:2px solid transparent;border-radius:0 4px 4px 0}
  #rail button.on{color:var(--amber);border-left-color:var(--amber);background:var(--panel)}
  #view{padding:16px 18px}
  .grid3{grid-template-columns:repeat(4,1fr)}
  .cols{display:grid;grid-template-columns:1.6fr 1fr;gap:12px;align-items:start}
}
@media(max-width:999px){ .cols{display:block} }
</style>
</head>
<body>

<header id="top">
  <div id="brand">QTSYS <span>terminal</span></div>
  <span class="chip" id="modechip">…</span>
  <span class="chip" id="clk-eq">EQ —</span>
  <span class="chip open" id="clk-cx">CRYPTO 24/7</span>
  <button id="agents-led" data-nav="agents" title="agents"><span class="led" id="led"></span><span id="ledtxt">AGENTS</span></button>
  <div id="equity"><div class="v num" id="eqv">—</div><div class="d num" id="eqd">—</div></div>
  <button id="killbtn">KILL</button>
</header>

<div id="pbar"><span class="lbl">POSTURE</span><div class="pseg" id="pseg"><button data-p="SURVIVAL">SURVIVAL</button><button data-p="BALANCED">BALANCED</button><button data-p="AGGRESSIVE">AGGRESSIVE</button></div><span class="pstat"><span class="k">RISK/TRADE</span><span class="help" tabindex="0" data-tip="Fraction of account equity lost if the stop is hit. Position size is solved FROM this number (skill 03) — it is the only lever that buys speed, and this bar prices it.">?</span><span class="v num" id="ps0">—</span></span><span class="pstat"><span class="k">PER 100 TRADES</span><span class="help" tabindex="0" data-tip="Median account multiple after 100 trades — 10,000 bootstrap resamples of the 317 REAL out-of-sample flagship trades, not a projection.">?</span><span class="v num" id="ps1">—</span></span><span class="pstat"><span class="k">P(DOUBLE)</span><span class="help" tabindex="0" data-tip="Probability the account touches 2x its starting equity at any point within 100 trades.">?</span><span class="v num" id="ps2">—</span></span><span class="pstat"><span class="k">MED MAXDD</span><span class="help" tabindex="0" data-tip="Median of the worst peak-to-trough drawdown experienced along each 100-trade path. Expect roughly this at least once.">?</span><span class="v num" id="ps3">—</span></span><span class="pstat"><span class="k">P(DD>30%)</span><span class="help" tabindex="0" data-tip="Chance of a drawdown deeper than 30% somewhere in 100 trades — the honest price of the aggressive setting.">?</span><span class="v num" id="ps4">—</span></span><span class="pstat"><span class="k">P(DD>50%)</span><span class="help" tabindex="0" data-tip="Chance of losing half the account at some point — ruin-adjacent. Any plan that needs this risk level is a plan to gamble.">?</span><span class="v num" id="ps5">—</span></span><span class="pdiv" aria-hidden="true">│</span><span class="pstat"><span class="k">BT E/TRADE</span><span class="help" tabindex="0" data-tip="Certified BACKTEST expectancy per trade — net of fees, from the real out-of-sample flagship trades. This is what the account is underwritten on.">?</span><span class="v num" id="tk_bt">—</span></span><span class="pstat"><span class="k">LIVE E/TRADE</span><span class="help" tabindex="0" data-tip="Realised expectancy per trade from the account's ACTUAL executed round-trips (venue fills, netted at the same fee model). Blank until real trades exist.">?</span><span class="v num" id="tk_live">—</span></span><span class="pstat"><span class="k">Δ vs BT</span><span class="help" tabindex="0" data-tip="Live minus backtest expectancy. The go-live gate (skill 10) is live within 1 SE of the certified backtest value.">?</span><span class="v num" id="tk_diff">—</span></span><span class="pstat"><span class="k">LIVE TRADES</span><span class="help" tabindex="0" data-tip="Number of realised round-trips executed on the venue. Need >=30 for a statistically meaningful comparison.">?</span><span class="v num" id="tk_n">0</span></span><span class="pstat"><span class="k">TRACKING</span><span class="help" tabindex="0" data-tip="Verdict: on-model = live expectancy within 1 SE of backtest; DRIFT = live has diverged from the backtest and needs review before scaling.">?</span><span class="v" id="tk_verdict">—</span></span></div>

<div id="tape" aria-hidden="true"><div id="tape-inner"></div></div>

<div id="shell">
  <nav id="rail" aria-label="views"></nav>
  <main id="view" tabindex="-1"></main>
</div>

<div id="cmdwrap">
  <div id="cmdrow"><span class="p">&gt;</span>
    <input id="cmd" autocomplete="off" spellcheck="false"
      placeholder="WTI · BTC GP · POS · RISK · POSTURE SURVIVAL · BUY WTI 100 · KILL · HELP" aria-label="command">
  </div>
  <div id="cmdhint"><b>&lt;TICKER&gt;</b> security page · <b>POS</b> portfolio · <b>RISK</b> · <b>AGT</b> agents · <b>STRAT</b> · <b>MKT</b> · <b>BUY/SELL SYM QTY [LMT px]</b> · <b>KILL</b></div>
</div>

<nav id="tabs" aria-label="views"></nav>
<div id="toasts" role="status"></div>
<div id="modal" role="dialog" aria-modal="true"><div class="box">
  <h3 id="mtitle"></h3><p id="mbody"></p>
  <input id="mconfirm" placeholder="" style="width:100%;margin-bottom:12px;display:none">
  <div class="row"><button class="btn" id="mcancel">Cancel</button>
  <button class="btn danger" id="mok">Confirm</button></div>
</div></div>

<script>
"use strict";
/* ============================================================ utilities */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt=(x,d=2)=>x==null||isNaN(x)?"—":Number(x).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const money=(x,d=0)=>(x<0?"−$":"$")+fmt(Math.abs(x),d);
const signed=(x,d=2)=>(x>=0?"+":"−")+fmt(Math.abs(x),d);
const pct=(x,d=2)=>signed(x,d)+"%";
const cls=x=>x>=0?"up":"dn";
const ago=ts=>{const s=Math.max(0,(Date.now()/1000)-ts);return s<60?`${s|0}s ago`:s<3600?`${s/60|0}m ago`:`${s/3600|0}h ago`};
function toast(msg,kind=""){const el=document.createElement("div");el.className="toast "+kind;
  el.textContent=msg;$("#toasts").appendChild(el);setTimeout(()=>el.remove(),3800)}
function confirmBox(title,body,typed,cb){$("#mtitle").textContent=title;$("#mbody").textContent=body;
  const inp=$("#mconfirm");inp.style.display=typed?"block":"none";inp.value="";inp.placeholder=typed?`type ${typed} to confirm`:"";
  $("#modal").classList.add("show");
  $("#mok").onclick=()=>{if(typed&&inp.value.trim().toUpperCase()!==typed){toast(`Type ${typed} to confirm`,"err");return}
    $("#modal").classList.remove("show");cb()};
  $("#mcancel").onclick=()=>$("#modal").classList.remove("show")}

/* ============================================================ universe */
const UNIVERSE=[
 ["WTI","WTI Crude Oil — real daily 1986→","Commodity",true],
 ["BRENT","Brent Crude Oil — real daily 1987→","Commodity",true],
 ["NATGAS","Henry Hub Nat Gas — real daily 1997→","Commodity",true],
 ["BTC","Bitcoin — Coin Metrics, real daily 2010→","Crypto",true],
 ["ETH","Ethereum — Coin Metrics, real daily 2015→","Crypto",true],
 ["EURUSD","Euro / US Dollar — real daily 1999→","FX",true],
 ["GBPUSD","British Pound / USD — real daily 1971→","FX",true],
 ["AUDUSD","Australian Dollar / USD — real daily 1971→","FX",true],
 ["JPYUSD","Japanese Yen / USD — real daily 1971→","FX",true],
 ["CHFUSD","Swiss Franc / USD — real daily 1971→","FX",true],
 ["CADUSD","Canadian Dollar / USD — real daily 1971→","FX",true],
 ["VIX","CBOE Volatility Index — real daily 1990→","Index — analyse-only",false],

function demoFill(sym,side,qty,px){

function recalcAccount(){
  const a=S.account;let mv=0,gross=0,net=0,unreal=0;

/* ============================================================ analytics */
function smaArr(cs,n){const out=Array(cs.length).fill(null);let s=0;
  for(let i=0;i<cs.length;i++){s+=cs[i];if(i>=n)s-=cs[i-n];if(i>=n-1)out[i]=s/n}return out}
function rsi(cs,n=14){let g=0,l=0;for(let i=cs.length-n;i<cs.length;i++){
  const d=cs[i]-cs[i-1];if(d>0)g+=d;else l-=d}
  return l===0?100:100-100/(1+(g/n)/(l/n))}
function atr(bars,n=14){let s=0;for(let i=bars.length-n;i<bars.length;i++){
  const b=bars[i],pc=bars[i-1].c;
  s+=Math.max(b.h-b.l,Math.abs(b.h-pc),Math.abs(b.l-pc))}return s/n}
function rvol(cs,n=20){const rs=[];for(let i=cs.length-n;i<cs.length;i++)
  rs.push(Math.log(cs[i]/cs[i-1]));
  const m=rs.reduce((a,b)=>a+b,0)/n;
  return Math.sqrt(rs.reduce((a,b)=>a+(b-m)**2,0)/(n-1))*Math.sqrt(252)}
function agentRead(sym){
  const bars=S.bars[sym];if(!bars||bars.length<120)return null;
  const cs=bars.map(b=>b.c),s20=smaArr(cs,20),s100=smaArr(cs,100);
  const i=cs.length-1,trendUp=s20[i]>s100[i],px=cs[i];
  const v20=rvol(cs,20),v100=rvol(cs,Math.min(100,cs.length-2));
  const volReg=v20/v100>1.35?"HIGH-VOL":v20/v100<0.8?"CALM":"NORMAL";
  const trend=px>s100[i]&&trendUp?"UPTREND":px<s100[i]&&!trendUp?"DOWNTREND":"SIDEWAYS";
  const r=rsi(cs);
  let sig="no setup",side=0;
  if(trend==="UPTREND"&&r<35){sig="mean-rev dip candidate (long)";side=1}
  else if(trendUp&&px>s100[i]){sig="momentum continuation (long)";side=1}
  else if(!trendUp&&px<s100[i]){sig="momentum continuation (short)";side=-1}
  // deterministic demo P(win) from the same features the real selector uses
  let p=0.50+(volReg==="CALM"?0.09:volReg==="HIGH-VOL"?-0.11:0)
        +(trend!=="SIDEWAYS"?0.06:-0.03)+(side===1&&r<35?0.05:0);
  p=Math.max(0.18,Math.min(0.86,p));
  return {trend,volReg,rsi:r,v20,sig,side,p,take:side!==0&&p>=0.55};
}

function drawSpark(cv,data,pos){
  const dpr=devicePixelRatio||1,w=cv.clientWidth||64,h=cv.clientHeight||22;
  cv.width=w*dpr;cv.height=h*dpr;const x=cv.getContext("2d");x.scale(dpr,dpr);
  const mn=Math.min(...data),mx=Math.max(...data),sp=(mx-mn)||1;
  x.beginPath();data.forEach((v,i)=>{const px=i/(data.length-1)*w,
    py=h-2-((v-mn)/sp)*(h-4);i?x.lineTo(px,py):x.moveTo(px,py)});
  x.strokeStyle=pos?"#27d17f":"#ff5063";x.lineWidth=1.4;x.stroke();
}
let CH=null;
function drawChart(sym){
  const cv=$("#chart");if(!cv)return;
  const all=S.bars[sym]||[];const bars=all.slice(-S.tf);if(bars.length<5)return;
  const dpr=devicePixelRatio||1,w=cv.clientWidth,h=Math.max(280,Math.min(390,innerHeight*0.4));
  cv.width=w*dpr;cv.height=h*dpr;cv.style.height=h+"px";
  const x=cv.getContext("2d");x.scale(dpr,dpr);
  const padR=58,padB=44,padT=8,cw=w-padR,chH=h-padB-padT,vh=30;
  const hi=Math.max(...bars.map(b=>b.h)),lo=Math.min(...bars.map(b=>b.l)),sp=(hi-lo)||1;
  const vmax=Math.max(...bars.map(b=>b.v||0));
  const X=i=>i/(bars.length)*cw+ (cw/bars.length)/2;
  const Y=v=>padT+(1-(v-lo)/sp)*(chH-vh-6);
  x.fillStyle="#0b0f15";x.fillRect(0,0,w,h);
  // grid + right axis
  x.strokeStyle="#151d28";x.fillStyle="#5b6579";x.font="10px "+getComputedStyle(document.body).fontFamily;
  x.textAlign="left";
  for(let g=0;g<=4;g++){const v=lo+sp*g/4,y=Y(v);
    x.beginPath();x.moveTo(0,y);x.lineTo(cw,y);x.stroke();
    x.fillText(fmt(v,pxd(sym)),cw+6,y+3)}
  // date ticks
  x.textAlign="center";
  for(let g=0;g<=4;g++){const i=Math.min(bars.length-1,Math.round(g/4*(bars.length-1)));
    x.fillText(bars[i].t.slice(2),X(i),h-padB+16)}
  // volume
  const bw=Math.max(1,cw/bars.length*0.62);
  bars.forEach((b,i)=>{const vhpx=vmax>0?((b.v||0)/vmax)*vh:0;
    x.fillStyle=b.c>=b.o?"rgba(39,209,127,.28)":"rgba(255,80,99,.28)";
    x.fillRect(X(i)-bw/2,padT+chH-vhpx,bw,vhpx)});
  // candles
  bars.forEach((b,i)=>{const up=b.c>=b.o,col=up?"#27d17f":"#ff5063";
    x.strokeStyle=col;x.beginPath();x.moveTo(X(i),Y(b.h));x.lineTo(X(i),Y(b.l));x.stroke();
    x.fillStyle=col;const y1=Y(Math.max(b.o,b.c)),y2=Y(Math.min(b.o,b.c));
    x.fillRect(X(i)-bw/2,y1,bw,Math.max(1,y2-y1))});
  // SMA overlays
  if(S.showSMA){const cs=bars.map(b=>b.c);
    [[smaArr(cs,20),"#58a6ff"],[smaArr(cs,100),"#ffb200"]].forEach(([arr,col])=>{
      x.strokeStyle=col;x.lineWidth=1.3;x.beginPath();let started=false;
      arr.forEach((v,i)=>{if(v==null)return;const px=X(i),py=Y(v);
        started?x.lineTo(px,py):(x.moveTo(px,py),started=true)});x.stroke()});x.lineWidth=1}
  // last price line
  const last=bars[bars.length-1].c;x.strokeStyle="rgba(255,178,0,.6)";x.setLineDash([4,4]);
  x.beginPath();x.moveTo(0,Y(last));x.lineTo(cw,Y(last));x.stroke();x.setLineDash([]);
  x.fillStyle="#ffb200";x.textAlign="left";x.fillText(fmt(last,pxd(sym)),cw+6,Y(last)+3);
  CH={bars,X,Y,cw,chH,padT,sym};
}

function pretrade(sym,side,qty,type,lp){
  const last=S.quotes[sym].last,px=type==="limit"?lp:last;
  const checks=[];const notional=Math.abs(qty*px);
  checks.push(["venue: tradable instrument",META[sym]?.tradable!==false,META[sym]?.tradable===false?"analyse-only":"ok"]);
  const pos=S.positions.find(p=>p.symbol===sym)?.qty||0;
  const newNotional=Math.abs((pos+(side==="buy"?qty:-qty))*last);
  const gl=(S.account.gross_exposure+notional)/Math.max(S.account.equity,1);
  checks.push(["order notional ≤ "+money(LIMITS.max_order_notional),notional<=LIMITS.max_order_notional,money(notional)]);
  checks.push(["position notional ≤ "+money(LIMITS.max_position_notional),newNotional<=LIMITS.max_position_notional,money(newNotional)]);
  checks.push(["gross leverage ≤ "+LIMITS.max_gross_leverage+"×",gl<=LIMITS.max_gross_leverage,fmt(gl,2)+"×"]);
  if(type==="limit")checks.push(["limit within ±10% of last",Math.abs(lp/last-1)<=LIMITS.price_band,pct((lp/last-1)*100)]);
  checks.push(["kill switch clear",!S.halted,S.halted?"HALTED":"clear"]);
  return {ok:checks.every(c=>c[1]),checks,notional};
}

function vPortfolio(){
  const a=S.account;
  const cards=[["Equity",money(a.equity,0),""],["Cash",money(a.cash,0),""],

    ["Day P&L",signed(a.day_pnl,0),cls(a.day_pnl)],
    ["Open P&L",signed(a.total_pnl,0),cls(a.total_pnl)],
    ["Gross exposure",money(a.gross_exposure,0),""],
    ["Net exposure",signed(a.net_exposure,0),cls(a.net_exposure)],
    ["Leverage",fmt(a.leverage,2)+"×",a.leverage>1.5?"dn":""]];
  let h=S.halted?`<div class="panel" style="border-color:var(--dn)"><div class="pb" style="display:flex;gap:10px;align-items:center">
    <span class="pill rejected">TRADING HALTED</span><span class="mut" style="flex:1">Kill switch fired — book flat, new orders blocked. Agents keep monitoring.</span>
    <button class="btn" id="resume">RESUME…</button></div></div>`:"";
  h+=`<div class="panel"><div class="ph">Account · ${S.mode==="live"?"live paper":"demo book"}</div>
    <div class="pb grid3">${cards.map(([k,v,c])=>`<div class="stat"><div class="k">${k}</div>
    <div class="v num ${c}">${v}</div></div>`).join("")}</div></div>`;

  h+=`<div class="panel"><div class="ph">Positions <span class="right mut">${S.positions.length} open</span></div>
    <table><thead><tr><th>Sym</th><th>Qty</th><th>Avg cost</th><th>Last</th><th>Mkt value</th><th>Unreal P&L</th><th>Wgt</th></tr></thead><tbody>`;
  if(!S.positions.length)h+=`<tr><td colspan="7" class="mut">Flat — no open positions.</td></tr>`;
  for(const p of S.positions){const last=S.quotes[p.symbol].last,u=(last-p.avg_cost)*p.qty,
    mv=p.qty*last,wg=Math.abs(mv)/Math.max(S.account.gross_exposure,1)*100;
    h+=`<tr class="rowlink" data-sym="${p.symbol}"><td><span class="sym">${p.symbol}</span></td>
      <td class="num">${fmt(p.qty,Math.abs(p.qty)%1?4:0)}</td>
      <td class="num">${fmt(p.avg_cost,pxd(p.symbol))}</td>
      <td class="num">${fmt(last,pxd(p.symbol))}</td>
      <td class="num">${money(mv,0)}</td>
      <td class="num ${cls(u)}">${signed(u,0)}</td>
      <td><div class="bar" style="width:56px"><i style="width:${wg|0}%"></i></div></td></tr>`}
  h+="</tbody></table></div>";

  const working=S.orders.filter(o=>o.status==="working");
  h+=`<div class="panel"><div class="ph">Working orders <span class="right"><span class="pill working">${working.length} PENDING</span></span></div>
    <table><thead><tr><th>Sym</th><th>Side</th><th>Qty</th><th>Type</th><th>Limit</th><th>State</th><th></th></tr></thead><tbody>`;
  if(!working.length)h+=`<tr><td colspan="7" class="mut">No pending orders.</td></tr>`;
  for(const o of working){h+=`<tr><td><span class="sym" data-sym="${o.symbol}">${o.symbol}</span></td>
    <td class="${o.side==="buy"?"up":"dn"}">${o.side.toUpperCase()}</td>
    <td class="num">${fmt(o.qty,0)}</td><td>${o.type.toUpperCase()}</td>
    <td class="num">${o.limit_price?fmt(o.limit_price,pxd(o.symbol)):"—"}</td>
    <td><span class="pill working">WORKING</span></td>
    <td><button class="btn tiny danger" data-cancel="${o.id}">CANCEL</button></td></tr>`}
  h+="</tbody></table></div>";

  h+=`<div class="panel"><div class="ph">Order history & fills</div>
    <table><thead><tr><th>Time</th><th>Sym</th><th>Side</th><th>Qty</th><th>Px / Lmt</th><th>State</th></tr></thead><tbody>`;
  const hist=S.orders.slice(0,12);
  for(const o of hist){h+=`<tr><td class="mut">${new Date((o.ts||0)*1000).toTimeString().slice(0,8)}</td>
    <td><span class="sym" data-sym="${o.symbol}">${o.symbol}</span></td>
    <td class="${o.side==="buy"?"up":"dn"}">${o.side.toUpperCase()}</td>
    <td class="num">${fmt(o.qty,0)}</td>
    <td class="num">${o.limit_price?fmt(o.limit_price,pxd(o.symbol)):"MKT"}</td>
    <td><span class="pill ${o.status}">${o.status.toUpperCase()}</span></td></tr>`}
  h+=`</tbody></table>
  <div class="note">Fills (${S.fills.length}): ${S.fills.slice(0,5).map(f=>
    `${f.side==="buy"?"▲":"▼"} ${fmt(f.qty,0)} <span class="sym" data-sym="${f.symbol}">${f.symbol}</span> @ ${fmt(f.price,pxd(f.symbol))}`).join(" · ")||"none yet"}</div></div>`;
  return h;
}

function eqOpen(){const d=new Date(),u=d.getUTCDay(),h=d.getUTCHours()+d.getUTCMinutes()/60;
  return u>=1&&u<=5&&h>=13.5&&h<20}
function fxOpen(){const d=new Date(),u=d.getUTCDay(),h=d.getUTCHours();
  return !(u===6||(u===5&&h>=22)||(u===0&&h<22))}

  risk:vRisk,agents:vAgents,strats:vStrats};
function render(scroll){
  // header
  $("#modechip").className="chip "+(S.mode==="live"?"live":"demo");
  $("#modechip").textContent=S.mode==="live"?"LIVE · PAPER":"REPLAY · REAL HISTORY";
  $("#clk-eq").className="chip "+(eqOpen()?"open":"closed");
  $("#clk-eq").textContent="EQ "+(eqOpen()?"OPEN":"CLOSED");

  $("#eqv").textContent=money(a.equity,0);
  const d=$("#eqd");d.textContent=`${signed(a.day_pnl,0)} today`;d.className="d num "+cls(a.day_pnl);

  $("#led").className="led "+(anyOn?"on":"off");
  $("#ledtxt").textContent=anyOn?"AGENTS 24/7":"AGENTS OFF";
  $("#killbtn").className=S.halted?"halted":"";
  $("#killbtn").textContent=S.halted?"HALTED":"KILL";

  const tabsHtml=TABS.map(([p,l])=>`<button data-nav="${p}" class="${S.page===p?"on":""}">${l}</button>`).join("");

  $("#view").innerHTML=(VIEWS[S.page]||vMarkets)();

  $$("canvas.spark").forEach(cv=>{const s=cv.dataset.spark,q=S.quotes[s];
    drawSpark(cv,q.spark,q.spark.at(-1)>=q.spark[0])});
  if(S.page==="security"){drawChart(S.sym);
    const cv=$("#chart");cv.onpointermove=chartHover;cv.onpointerleave=()=>$("#xhair").style.display="none";
    $("#smabtn").onclick=()=>{S.showSMA=!S.showSMA;render()};
    $$("#tfseg button").forEach(b=>b.onclick=()=>{S.tf=+b.dataset.tf;render()});
    $$("[data-tside]").forEach(b=>b.onclick=()=>{S.ticket.side=b.dataset.tside;syncTicket();render()});
    $$("[data-ttype]").forEach(b=>b.onclick=()=>{S.ticket.type=b.dataset.ttype;S.ticket.lp=null;syncTicket();render()});
    const tq=$("#tqty"),tl=$("#tlp");
    tq.oninput=()=>{S.ticket.qty=parseFloat(tq.value)||0};
    if(tl)tl.oninput=()=>{S.ticket.lp=parseFloat(tl.value)||null};
    tq.onchange=tl?tl.onchange=()=>render():()=>render();
    $("#tsend").onclick=()=>{syncTicket();
      placeOrder(S.sym,S.ticket.side,S.ticket.qty||0,S.ticket.type,
        S.ticket.type==="limit"?(S.ticket.lp??parseFloat($("#tlp").value)):null)};
  }
  const master=$("#master");if(master)master.onclick=()=>toggleAgent(null,!S.agents.master);
  $$("[data-agent]").forEach(b=>b.onclick=()=>{
    const a=S.agents.list.find(x=>x.name===b.dataset.agent);toggleAgent(a.name,!a.enabled)});
  const res=$("#resume");if(res)res.onclick=resumeTrading;
  const k2=$("#killbtn2");if(k2)k2.onclick=killSwitch;
  function syncTicket(){const tq=$("#tqty");if(tq)S.ticket.qty=parseFloat(tq.value)||S.ticket.qty}
}
/* keep live inputs from being wiped by the 1s repaint: only repaint numbers on tick */
function lightRepaint(){
  const a=S.account;
  $("#eqv").textContent=money(a.equity,0);
  const d=$("#eqd");d.textContent=`${signed(a.day_pnl,0)} today`;d.className="d num "+cls(a.day_pnl);
  if(S.page==="markets"){ // update quote cells in place
    $$("tr.rowlink[data-sym]").forEach(tr=>{const s=tr.dataset.sym,q=S.quotes[s];if(!q)return;
      const tds=tr.querySelectorAll("td");if(tds.length<3)return;
      tds[1].textContent=fmt(q.last,pxd(s));
      const ch=chgOf(s);tds[2].textContent=pct(ch);tds[2].className="num "+cls(ch);});
    $$("canvas.spark").forEach(cv=>{const s=cv.dataset.spark,q=S.quotes[s];
      drawSpark(cv,q.spark,q.spark.at(-1)>=q.spark[0])});
  }
  if(S.page==="security"&&CH)drawChart(S.sym);
  tapeFill();
}

/* ============================================================ tape */
function tapeFill(){
  const inner=$("#tape-inner");
  const mk=UNIVERSE.map(([s])=>{const ch=chgOf(s);
    return `<span class="tp" data-sym="${s}"><b>${s}</b><span class="num ${cls(ch)}">${fmt(S.quotes[s].last,pxd(s))} ${pct(ch,1)}</span></span>`}).join("");
  inner.innerHTML=mk+mk;
}
let tapeX=0;
function tapeAnim(){
  if(!matchMedia("(prefers-reduced-motion: reduce)").matches){
    const inner=$("#tape-inner");tapeX-=0.4;
    if(-tapeX>inner.scrollWidth/2)tapeX=0;
    inner.style.transform=`translateX(${tapeX}px)`;
  }
  requestAnimationFrame(tapeAnim);
}

/* ============================================================ commands */
function runCmd(raw){
  const c=raw.trim().toUpperCase();if(!c)return;
  const parts=c.split(/\s+/);
  const nav1={POS:"portfolio",PORT:"portfolio",PORTFOLIO:"portfolio",RISK:"risk",
    AGT:"agents",AGENTS:"agents",STRAT:"strats",STRATS:"strats",MKT:"markets",
    MARKETS:"markets",NEWS:"markets",HELP:null,KILL:null};
  if(c==="KILL"){killSwitch();return}
  if(c==="POSTURE"&&parts[1]&&POSTURE_STATS[parts[1]]){applyPosture(parts[1],true);return}
  if(POSTURE_STATS[c]){applyPosture(c,true);return}
  if(c==="HELP"){toast("TICKER · TICKER GP/DES · POS · RISK · AGT · STRAT · BUY/SELL SYM QTY [LMT px] · POSTURE SURVIVAL|BALANCED|AGGRESSIVE · KILL");return}
  if(parts[0]==="BUY"||parts[0]==="SELL"){
    const sym=normSym(parts[1]);if(!sym){toast("Unknown symbol "+parts[1],"err");return}
    const qty=parseFloat(parts[2]);
    const isL=parts[3]==="LMT",lp=isL?parseFloat(parts[4]):null;
    placeOrder(sym,parts[0].toLowerCase(),qty,isL?"limit":"market",lp);return}
  if(c in nav1&&nav1[c]){nav(nav1[c]);return}
  const sym=normSym(parts[0]);
  if(sym){S.tf=380;S.ticket={side:"buy",type:"market"};nav("security",sym);return}
  toast("Unknown command — HELP for the list","err");
}
function normSym(s){if(!s)return null;s=s.toUpperCase();
  if(S.quotes[s])return s;
  const hit=Object.keys(S.quotes).find(k=>k.replace("-","")===s.replace("-",""));
  return hit||null}

/* ============================================================ boot */
document.addEventListener("click",e=>{
  const symEl=e.target.closest("[data-sym]");
  if(symEl){e.stopPropagation();S.tf=380;S.ticket={side:"buy",type:"market"};
    nav("security",symEl.dataset.sym);return}
  const nv=e.target.closest("[data-nav]");
  if(nv){nav(nv.dataset.nav);return}
  const cx=e.target.closest("[data-cancel]");
  if(cx){cancelOrder(cx.dataset.cancel);return}
});
$("#killbtn").onclick=()=>S.halted?resumeTrading():killSwitch();
$("#cmd").addEventListener("keydown",e=>{if(e.key==="Enter"){runCmd(e.target.value);e.target.value=""}});
window.addEventListener("hashchange",()=>{routeFromHash(false)});
function routeFromHash(initial){
  const m=location.hash.match(/^#\/sec\/([A-Za-z0-9.\-]+)/);
  if(m&&normSym(m[1])){S.page="security";S.sym=normSym(m[1])}
  else{const p=location.hash.replace(/^#\//,"");if(VIEWS[p])S.page=p}
  if(!initial)render();
}
(async function boot(){
  const live=await tryLive();
  if(live){S.mode="live";await liveInit()}
  else{S.mode="demo";demoInit();demoAgentsInit()}
  routeFromHash(true);
  render();tapeFill();tapeAnim();
  setInterval(()=>{ if(S.mode==="demo"){demoTick();agentsTick();lightRepaint();
      if(S.page==="agents"||S.page==="portfolio"||S.page==="risk"){/* full repaint below cadence */}}
  },1000);
  setInterval(()=>{ if(S.mode==="demo"&&["agents","portfolio","risk"].includes(S.page)
      &&document.activeElement.tagName!=="INPUT")render() },4000);
  if(S.mode==="live"){
    setInterval(async()=>{await liveRefresh();lightRepaint();
      if(["agents","portfolio","risk"].includes(S.page)
        &&document.activeElement.tagName!=="INPUT")render()},2000);
  }
})();
</script>
